{% extends 'base.html' %}
{% block title %}Upload Dataset - CleanSlate{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-4"><i class="bi bi-upload me-2"></i>Upload Dataset</h4>
                <p class="text-muted">Supported formats: CSV, Excel (.xlsx), JSON</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.file.id_for_label }}" class="form-label">Choose File</label>
                        {{ form.file }}
                        {% if form.file.errors %}
                            <div class="invalid-feedback d-block">{{ form.file.errors }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-cloud-upload me-1"></i> Upload
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
